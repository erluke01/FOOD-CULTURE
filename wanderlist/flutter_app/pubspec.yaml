name: wanderlist
description: Il nostro diario di viaggio
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # HTTP (for sync)
  http: ^1.2.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Persistence
  shared_preferences: ^2.3.2

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
